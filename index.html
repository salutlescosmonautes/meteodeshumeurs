<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Météo">
<title>Météo des Humeurs</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8; --card: rgba(255,255,255,0.7);
  --text: #1a1612; --text2: #7a6f64;
  --border: rgba(0,0,0,0.08); --shadow: rgba(0,0,0,0.06);
  --active: #1a1612; --active-text: #f5f0e8;
  --nudge: #8b3a3a; --nudge-bg: rgba(139,58,58,0.07);
}
.dark {
  --bg: #0f0e0c; --card: rgba(28,26,22,0.9);
  --text: #f0ebe0; --text2: #7a7268;
  --border: rgba(255,255,255,0.07); --shadow: rgba(0,0,0,0.3);
  --active: #f0ebe0; --active-text: #0f0e0c;
  --nudge: #e8a87c; --nudge-bg: rgba(232,168,124,0.07);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  height: 100%; overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  transition: background 0.5s ease;
}
.app {
  display: flex; flex-direction: column;
  height: 100%;
  padding: env(safe-area-inset-top, 10px) 10px env(safe-area-inset-bottom, 10px) 10px;
  gap: 5px;
}
.other-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 13px; padding: 9px 11px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 8px var(--shadow); flex-shrink: 0;
}
.other-emoji { font-size: 30px; line-height: 1; flex-shrink: 0; }
.other-text { flex: 1; min-width: 0; }
.other-label { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); font-weight: 500; }
.other-name { font-family: 'Instrument Serif', serif; font-size: 14px; font-style: italic; color: var(--text); line-height: 1.2; margin-top: 1px; }
.other-desc { font-size: 9px; color: var(--text2); font-weight: 300; line-height: 1.3; margin-top: 2px; }
.other-time { font-size: 8px; color: var(--text2); opacity: 0.6; margin-top: 2px; }
.buttons-list { display: flex; flex-direction: column; gap: 3px; flex: 1; overflow: hidden; }
.status-btn {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 6px 9px;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; transition: all 0.15s ease;
  box-shadow: 0 1px 3px var(--shadow);
  flex: 1; text-align: left; width: 100%;
}
.status-btn:active { transform: scale(0.98); opacity: 0.85; }
.status-btn.active { background: var(--active); border-color: var(--active); }
.status-btn.active .btn-label { color: var(--active-text); }
.status-btn.active .btn-desc { color: var(--active-text); opacity: 0.55; }
.btn-emoji { font-size: 18px; line-height: 1; flex-shrink: 0; width: 24px; text-align: center; }
.btn-text { flex: 1; min-width: 0; }
.btn-label { font-size: 11px; font-weight: 500; color: var(--text); display: block; line-height: 1.2; }
.btn-desc { font-size: 8.5px; color: var(--text2); font-weight: 300; display: block; line-height: 1.3; margin-top: 1px; }
.nudge-btn {
  background: var(--nudge-bg); border: 1px solid rgba(139,58,58,0.12);
  border-radius: 10px; padding: 7px 11px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: all 0.15s ease;
  flex-shrink: 0; width: 100%;
}
.dark .nudge-btn { border-color: rgba(232,168,124,0.12); }
.nudge-btn:active { transform: scale(0.98); }
.nudge-left { display: flex; align-items: center; gap: 7px; }
.nudge-text { font-size: 11px; color: var(--nudge); font-weight: 500; }
.nudge-schedule { font-size: 9px; color: var(--text2); text-align: right; line-height: 1.6; }
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text); color: var(--bg);
  padding: 7px 16px; border-radius: 100px;
  font-size: 12px; font-weight: 500;
  opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="other-card">
    <span class="other-emoji" id="other-emoji">…</span>
    <div class="other-text">
      <div class="other-label">iel</div>
      <div class="other-name" id="other-name">chargement</div>
      <div class="other-desc" id="other-desc"></div>
      <div class="other-time" id="other-time"></div>
    </div>
  </div>
  <div class="buttons-list" id="buttons-list"></div>
  <button class="nudge-btn" onclick="sendNudge()">
    <div class="nudge-left">
      <span style="font-size:15px">🚩</span>
      <span class="nudge-text">demander une mise à jour</span>
    </div>
    <div class="nudge-schedule" id="nudge-schedule">—</div>
  </button>
</div>
<div class="toast" id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDoKJZJiIVGux81dxvfhUscqe9c0baElQ4",
  authDomain: "meteo-des-humeurs.firebaseapp.com",
  databaseURL: "https://meteo-des-humeurs-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meteo-des-humeurs"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const MY_USER = "user1", OTHER_USER = "user2";

const choices = [
  { emoji: "💥", label: "Hot and brave", desc: "consentement à l'imprévu sexuel et kinky total, y compris CNC" },
  { emoji: "🔥", label: "Heat wave", desc: "consentement à l'imprévu sexuel et kinky engagé (ex: lieux engageants, invité·e·s) sans perte de contrôle" },
  { emoji: "❤️‍🔥", label: "Control kink", desc: "consentement à l'imprévu sexuel kinky sans perte de contrôle" },
  { emoji: "❤️", label: "Sweet body", desc: "consentement à l'imprévu sexuel vanille" },
  { emoji: "🩷", label: "Sweet heart", desc: "consentement à l'imprévu non-sexuel" },
  { emoji: "🤍", label: "Own Peace", desc: "besoin de respirer / me reposer / dormir, ne pas me déranger" },
  { emoji: "🏳", label: "White romance", desc: "épuisé·e mais besoin de toi" },
  { emoji: "🏴", label: "Dark romance", desc: "je ne vais pas bien et j'ai besoin de toi" },
  { emoji: "🕷", label: "Dark Vador", desc: "je ne vais pas bien mais j'aimerais qu'on me laisse" },
  { emoji: "🐝", label: "Busy bee", desc: "au travail / en groupe / truc important, ne pas déranger" },
  { emoji: "🪹", label: "Cuckoo's nest", desc: "en bonne compagnie, ne pas déranger" },
  { emoji: "🪺", label: "Bonobo's nest", desc: "en bonne compagnie, imprévus bienvenus si compagnie consentante et prévenue (ou complice) — inclus dans 💥 et 🔥" }
];

let myCurrentStatus = null;

function updateTheme() {
  const h = new Date().getHours();
  document.body.classList.toggle('dark', h >= 20 || h < 7);
}

function renderButtons() {
  const list = document.getElementById('buttons-list');
  list.innerHTML = '';
  choices.forEach(c => {
    const full = c.emoji + ' ' + c.label;
    const btn = document.createElement('button');
    btn.className = 'status-btn';
    btn.dataset.value = full;
    btn.innerHTML =
      '<span class="btn-emoji">' + c.emoji + '</span>' +
      '<div class="btn-text">' +
        '<span class="btn-label">' + c.label + '</span>' +
        '<span class="btn-desc">' + c.desc + '</span>' +
      '</div>';
    btn.onclick = () => setMyStatus(full);
    list.appendChild(btn);
  });
}

function highlightActive(s) {
  document.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('active', b.dataset.value === s));
}

function setMyStatus(s) {
  const isConfirm = s === myCurrentStatus;
  myCurrentStatus = s;
  highlightActive(s);
  db.ref('status/' + MY_USER).set({ text: s, time: Date.now() });
  if (isConfirm) {
    pulseActive(s);
    showToast('Statut confirmé ✓');
  } else {
    showToast('Statut mis à jour ✓');
  }
}

function pulseActive(s) {
  const btn = Array.from(document.querySelectorAll('.status-btn')).find(b => b.dataset.value === s);
  if (!btn) return;
  btn.style.transition = 'transform 0.1s ease';
  btn.style.transform = 'scale(1.03)';
  setTimeout(() => { btn.style.transform = 'scale(1)'; }, 150);
}

function getDesc(t) {
  const f = choices.find(c => t.startsWith(c.emoji));
  return f ? f.desc : '';
}

db.ref('status/' + OTHER_USER).on('value', snap => {
  const d = snap.val();
  if (!d) {
    document.getElementById('other-emoji').textContent = '—';
    document.getElementById('other-name').textContent = 'pas encore de statut';
    return;
  }
  const p = d.text.split(' ');
  document.getElementById('other-emoji').textContent = p[0];
  document.getElementById('other-name').textContent = p.slice(1).join(' ');
  document.getElementById('other-desc').textContent = getDesc(d.text);
  const diff = Math.floor((Date.now() - d.time) / 60000);
  const t = diff < 1 ? "à l'instant" : diff < 60 ? 'il y a ' + diff + ' min' : diff < 1440 ? 'il y a ' + Math.floor(diff/60) + 'h' : new Date(d.time).toLocaleDateString('fr-FR');
  document.getElementById('other-time').textContent = 'màj ' + t;
});

db.ref('status/' + MY_USER).once('value', snap => {
  const d = snap.val();
  if (d) { myCurrentStatus = d.text; highlightActive(d.text); }
});

// Nudge schedule handled by refreshNudgePanel()

function sendNudge() {
  const now = Date.now();
  db.ref('meta/' + OTHER_USER + '/n').set(true);
  db.ref('meta/' + OTHER_USER + '/nudge_sent_at').set(now);
  showToast('🚩 Demande envoyée');
  setTimeout(refreshNudgePanel, 500);
}

function fmtTime(ts) {
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + 'h' + String(d.getMinutes()).padStart(2,'0');
}

function fmtDateTime(ts) {
  const d = new Date(ts);
  const day = d.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'});
  return day + ' ' + fmtTime(ts);
}

function refreshNudgePanel() {
  const el = document.getElementById('nudge-schedule');

  Promise.all([
    db.ref('meta/' + OTHER_USER + '/schedule').once('value'),
    db.ref('meta/' + OTHER_USER + '/nudge_sent_at').once('value'),
    db.ref('meta/' + OTHER_USER + '/n').once('value'),
    db.ref('status/' + OTHER_USER).once('value')
  ]).then(([schedSnap, nudgeSentSnap, nudgeActiveSnap, statusSnap]) => {
    const now = Date.now();
    const schedData = schedSnap.val();
    const nudgeSentAt = nudgeSentSnap.val() || 0;
    const nudgeActive = nudgeActiveSnap.val();
    const lastUpdate = statusSnap.val()?.time || 0;
    const slots = (schedData?.slots || []).filter(t => t > now);

    let lines = [];

    // Requêtes en retard (passées sans réponse)
    const pastSlots = (schedData?.slots || []).filter(t => t <= now && t > lastUpdate);
    const nudgeUnanswered = nudgeSentAt > 0 && nudgeSentAt > lastUpdate;

    // Regrouper toutes les requêtes non répondues
    let unanswered = [];
    if (nudgeUnanswered) unanswered.push({ type: 'nudge', time: nudgeSentAt });
    pastSlots.forEach(t => unanswered.push({ type: 'auto', time: t }));
    unanswered.sort((a, b) => b.time - a.time); // plus récente en premier

    if (unanswered.length > 0) {
      // La plus récente
      const latest = unanswered[0];
      const icon = latest.type === 'nudge' ? '🚩' : '⏰';
      lines.push(icon + ' ' + fmtTime(latest.time) + ' — en attente');
      // Les autres en retard
      unanswered.slice(1).forEach(r => {
        const ic = r.type === 'nudge' ? '🚩' : '⏰';
        lines.push(ic + ' ' + fmtTime(r.time) + ' — en attente');
      });
    } else {
      // Dernière requête répondue
      const allPast = [...(schedData?.slots || []).filter(t => t <= now)];
      if (nudgeSentAt > 0) allPast.push(nudgeSentAt);
      allPast.sort((a, b) => b - a);
      if (allPast.length > 0 && lastUpdate > 0) {
        const latest = allPast[0];
        const icon = latest === nudgeSentAt ? '🚩' : '⏰';
        if (lastUpdate > latest) {
          lines.push(icon + ' ' + fmtTime(latest) + ' — répondu à ' + fmtTime(lastUpdate) + ' ✓');
        }
      }
    }

    // Prochains rappels
    slots.forEach(t => {
      lines.push('→ rappel auto ~' + fmtTime(t));
    });

    if (lines.length === 0) {
      lines.push('rappel demain');
    }

    el.innerHTML = lines.join('<br>');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

updateTheme();
renderButtons();
refreshNudgePanel();
setInterval(updateTheme, 60000);
setInterval(refreshNudgePanel, 30000);
</script>
</body>
</html>
