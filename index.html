<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Météo">
<title>Météo des Humeurs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8; --card: rgba(255,255,255,0.6);
  --text: #1a1612; --text2: #7a6f64;
  --border: rgba(0,0,0,0.08); --shadow: rgba(0,0,0,0.08);
  --btn-active: #1a1612; --btn-active-text: #f5f0e8;
  --nudge: #8b3a3a; --nudge-bg: rgba(139,58,58,0.08);
}
.dark {
  --bg: #0f0e0c; --card: rgba(30,28,24,0.8);
  --text: #f0ebe0; --text2: #7a7268;
  --border: rgba(255,255,255,0.07); --shadow: rgba(0,0,0,0.4);
  --btn-active: #f0ebe0; --btn-active-text: #0f0e0c;
  --nudge: #e8a87c; --nudge-bg: rgba(232,168,124,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  padding: env(safe-area-inset-top,20px) env(safe-area-inset-right,0) env(safe-area-inset-bottom,20px) env(safe-area-inset-left,0);
  transition: background 0.6s ease, color 0.6s ease;
}
.app { max-width: 430px; margin: 0 auto; padding: 20px 16px 40px; }

/* Header */
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
.header-title { font-family:'Instrument Serif',serif; font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text2); }
.time-indicator { font-size:11px; color:var(--text2); font-weight:300; }

/* Carte statut de l'autre */
.other-card {
  background:var(--card); border:1px solid var(--border); border-radius:24px;
  padding:20px; margin-bottom:20px;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  box-shadow:0 4px 24px var(--shadow);
}
.other-label { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text2); margin-bottom:14px; font-weight:500; }
.other-inner { display:flex; align-items:center; gap:16px; }
.other-emoji-big { font-size:56px; line-height:1; flex-shrink:0; }
.other-text { flex:1; }
.other-name { font-family:'Instrument Serif',serif; font-size:21px; color:var(--text); font-style:italic; margin-bottom:4px; line-height:1.2; }
.other-desc { font-size:11px; color:var(--text2); font-weight:300; line-height:1.4; margin-bottom:6px; }
.other-time { font-size:10px; color:var(--text2); font-weight:300; opacity:0.7; }

/* Section mes boutons */
.my-section-label { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text2); margin-bottom:12px; font-weight:500; padding-left:2px; }
.buttons-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }

/* Bouton statut — layout 2 colonnes */
.status-btn {
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:12px; text-align:left; cursor:pointer; transition:all 0.2s ease;
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  box-shadow:0 2px 8px var(--shadow);
  display:flex; align-items:center; gap:10px;
}
.status-btn:active { transform:scale(0.96); }
.status-btn.active {
  background:var(--btn-active); border-color:var(--btn-active);
  box-shadow:0 4px 16px var(--shadow);
}
.status-btn.active .btn-label,
.status-btn.active .btn-desc { color:var(--btn-active-text); }
.status-btn.active .btn-emoji-col { color:var(--btn-active-text); }

.btn-emoji-col { font-size:28px; line-height:1; flex-shrink:0; }
.btn-text-col { flex:1; min-width:0; }
.btn-label { font-size:11px; color:var(--text); font-weight:500; line-height:1.3; display:block; margin-bottom:3px; }
.btn-desc { font-size:9px; color:var(--text2); font-weight:300; line-height:1.3; display:block; }

/* Bouton nudge */
.nudge-btn {
  background:var(--nudge-bg); border:1px solid rgba(139,58,58,0.15); border-radius:16px;
  padding:14px 16px; width:100%; text-align:left; cursor:pointer; transition:all 0.2s ease;
  display:flex; align-items:center; justify-content:space-between; margin-top:8px;
}
.dark .nudge-btn { border-color:rgba(232,168,124,0.15); }
.nudge-btn:active { transform:scale(0.98); }
.nudge-left { display:flex; align-items:center; gap:10px; }
.nudge-flag { font-size:20px; }
.nudge-text { font-size:12px; color:var(--nudge); font-weight:500; }
.nudge-schedule { font-size:10px; color:var(--text2); font-weight:300; text-align:right; line-height:1.4; }

/* Toast */
.toast {
  position:fixed; bottom:calc(env(safe-area-inset-bottom,20px) + 20px);
  left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--text); color:var(--bg); padding:10px 20px;
  border-radius:100px; font-size:13px; font-weight:500;
  opacity:0; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none; white-space:nowrap; z-index:100;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-title">Météo des humeurs</span>
    <span class="time-indicator" id="clock"></span>
  </div>

  <div class="other-card">
    <div class="other-label">iel</div>
    <div class="other-inner">
      <span class="other-emoji-big" id="other-emoji">…</span>
      <div class="other-text">
        <div class="other-name" id="other-name">chargement</div>
        <div class="other-desc" id="other-desc"></div>
        <div class="other-time" id="other-time"></div>
      </div>
    </div>
  </div>

  <div class="my-section-label">moi</div>
  <div class="buttons-grid" id="buttons-grid"></div>

  <button class="nudge-btn" onclick="sendNudge()">
    <div class="nudge-left">
      <span class="nudge-flag">🚩</span>
      <span class="nudge-text">demander une mise à jour</span>
    </div>
    <div class="nudge-schedule" id="nudge-schedule">—</div>
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDoKJZJiIVGux81dxvfhUscqe9c0baElQ4",
  authDomain: "meteo-des-humeurs.firebaseapp.com",
  databaseURL: "https://meteo-des-humeurs-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "meteo-des-humeurs"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const MY_USER = "user1";
const OTHER_USER = "user2";

const choices = [
  { emoji: "\u{1F4A5}", label: "Hot and brave", desc: "consentement \u00e0 l\u2019impr\u00e9vu sexuel et kinky total, y compris CNC" },
  { emoji: "\u{1F525}", label: "Heat wave", desc: "consentement \u00e0 l\u2019impr\u00e9vu sexuel et kinky engag\u00e9 (ex: lieux engageants, invit\u00e9\u00b7e\u00b7s) sans perte de contr\u00f4le" },
  { emoji: "\u2764\uFE0F\u200D\u{1F525}", label: "Control kink", desc: "consentement \u00e0 l\u2019impr\u00e9vu sexuel kinky sans perte de contr\u00f4le" },
  { emoji: "\u2764\uFE0F", label: "Sweet body", desc: "consentement \u00e0 l\u2019impr\u00e9vu sexuel vanille" },
  { emoji: "\u{1F497}", label: "Sweet heart", desc: "consentement \u00e0 l\u2019impr\u00e9vu non-sexuel" },
  { emoji: "\u{1F90D}", label: "Own Peace", desc: "besoin de respirer / me reposer / dormir, ne pas me d\u00e9ranger" },
  { emoji: "\u{1F3F3}", label: "White romance", desc: "\u00e9puis\u00e9\u00b7e mais besoin de toi" },
  { emoji: "\u{1F3F4}", label: "Dark romance", desc: "je ne vais pas bien et j\u2019ai besoin de toi" },
  { emoji: "\u{1F577}", label: "Dark Vador", desc: "je ne vais pas bien mais j\u2019aimerais qu\u2019on me laisse" },
  { emoji: "\u{1F41D}", label: "Busy bee", desc: "au travail / en groupe / truc important, ne pas d\u00e9ranger" },
  { emoji: "\u{1FAB9}", label: "Cuckoo\u2019s nest", desc: "en bonne compagnie, ne pas d\u00e9ranger" },
  { emoji: "\u{1FABA}", label: "Bonobo\u2019s nest", desc: "en bonne compagnie, impr\u00e9vus bienvenus si compagnie consentante et pr\u00e9venue (ou complice) \u2014 inclus dans 💥 et 🔥" }
];

let myCurrentStatus = null;

function updateTheme() {
  const h = new Date().getHours();
  document.body.classList.toggle('dark', h >= 20 || h < 7);
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

function renderButtons() {
  const grid = document.getElementById('buttons-grid');
  grid.innerHTML = '';
  choices.forEach(c => {
    const fullLabel = c.emoji + ' ' + c.label;
    const btn = document.createElement('button');
    btn.className = 'status-btn';
    btn.dataset.value = fullLabel;
    btn.innerHTML =
      '<span class="btn-emoji-col">' + c.emoji + '</span>' +
      '<div class="btn-text-col">' +
        '<span class="btn-label">' + c.label + '</span>' +
        '<span class="btn-desc">' + c.desc + '</span>' +
      '</div>';
    btn.onclick = () => setMyStatus(fullLabel);
    grid.appendChild(btn);
  });
}

function highlightActive(status) {
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.value === status);
  });
}

function setMyStatus(status) {
  myCurrentStatus = status;
  highlightActive(status);
  db.ref('status/' + MY_USER).set({ text: status, time: Date.now() });
  showToast('Statut mis \u00e0 jour \u2713');
}

function getDescForStatus(text) {
  const found = choices.find(c => text.startsWith(c.emoji));
  return found ? found.desc : '';
}

db.ref('status/' + OTHER_USER).on('value', snap => {
  const data = snap.val();
  if (!data) {
    document.getElementById('other-emoji').textContent = '\u2014';
    document.getElementById('other-name').textContent = 'pas encore de statut';
    document.getElementById('other-desc').textContent = '';
    return;
  }
  const parts = data.text.split(' ');
  document.getElementById('other-emoji').textContent = parts[0];
  document.getElementById('other-name').textContent = parts.slice(1).join(' ');
  document.getElementById('other-desc').textContent = getDescForStatus(data.text);

  const diffMin = Math.floor((Date.now() - data.time) / 60000);
  let timeStr;
  if (diffMin < 1) timeStr = "à l'instant";
  else if (diffMin < 60) timeStr = 'il y a ' + diffMin + ' min';
  else if (diffMin < 1440) timeStr = 'il y a ' + Math.floor(diffMin/60) + 'h';
  else timeStr = new Date(data.time).toLocaleDateString('fr-FR');
  document.getElementById('other-time').textContent = 'mis à jour ' + timeStr;
});

db.ref('status/' + MY_USER).once('value', snap => {
  const data = snap.val();
  if (data) { myCurrentStatus = data.text; highlightActive(data.text); }
});

db.ref('meta/' + OTHER_USER + '/schedule').once('value', snap => {
  const data = snap.val();
  if (!data || !data.slots) return;
  const next = data.slots.find(t => t > Date.now());
  const el = document.getElementById('nudge-schedule');
  if (next) {
    const d = new Date(next);
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    el.textContent = 'prochain rappel\nautomatique ~' + h + 'h' + m;
    el.style.whiteSpace = 'pre';
  } else {
    el.textContent = 'prochain rappel\ndemain';
    el.style.whiteSpace = 'pre';
  }
});

function sendNudge() {
  db.ref('meta/' + OTHER_USER + '/n').set(true);
  showToast('\u{1F6A9} Demande envoy\u00e9e');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

updateTheme(); updateClock(); renderButtons();
setInterval(updateClock, 30000);
setInterval(updateTheme, 60000);
</script>
</body>
</html>
